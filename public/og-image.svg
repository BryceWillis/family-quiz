<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF8E53"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="80" cy="80" r="160" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1150" cy="580" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="60" r="100" fill="rgba(255,255,255,0.04)"/>
  <circle cx="200" cy="560" r="90"  fill="rgba(255,255,255,0.04)"/>

  <!-- Emoji -->
  <text x="600" y="270"
        text-anchor="middle"
        font-size="150"
        font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">🎉</text>

  <!-- Title -->
  <text x="600" y="390"
        text-anchor="middle"
        font-size="88"
        font-weight="900"
        font-family="Segoe UI,system-ui,-apple-system,sans-serif"
        fill="white"
        letter-spacing="-1">Family Quiz!</text>

  <!-- Tagline -->
  <text x="600" y="460"
        text-anchor="middle"
        font-size="36"
        font-family="Segoe UI,system-ui,-apple-system,sans-serif"
        fill="rgba(255,255,255,0.82)">Real-time multiplayer quiz for the whole family</text>

  <!-- Bottom pill -->
  <rect x="360" y="492" width="480" height="56" rx="28" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="526"
        text-anchor="middle"
        font-size="26"
        font-family="Segoe UI,system-ui,-apple-system,sans-serif"
        fill="rgba(255,255,255,0.9)"
        font-weight="600">AI questions · Live scores · Fun for all ages</text>
</svg>
